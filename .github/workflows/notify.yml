name: PR Slack Notifier

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pr-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll notifications and DM Slack
        run: python notify.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GITHUB_LOGIN: hertjo

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "pr-notifier"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notifier state"
            git push
          fi
