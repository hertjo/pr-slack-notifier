name: PR Slack Notifier

on:
  schedule:
    # Cron is UTC and 5 min is the GitHub Actions minimum (2 min is not possible).
    # Window covers ~9am-8pm America/New_York across both EST and EDT (UTC-5 / UTC-4).
    - cron: "*/5 0,13-23 * * *"   # daytime NY: every 5 minutes
    - cron: "*/15 1-12 * * *"     # overnight NY: every 15 minutes
  workflow_dispatch:
    inputs:
      test_dm:
        description: "Send a one-off test DM and exit"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: pr-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll notifications and DM Slack
        run: python notify.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GITHUB_LOGIN: hertjo
          TEST_DM: ${{ github.event.inputs.test_dm == 'true' && '1' || '' }}

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "pr-notifier"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notifier state"
            git push
          fi
