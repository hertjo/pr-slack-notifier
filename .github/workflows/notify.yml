name: PR Slack Notifier

on:
  schedule:
    # UTC. Window approximates 9am-8pm America/New_York across EST and EDT (UTC-5 / -4).
    # Daytime: hourly trigger; the job then polls ~every 2 min for the hour (cron can't do 2 min).
    - cron: "0 0,13-23 * * *"   # daytime NY: hourly kick-off -> internal 2-min loop
    - cron: "*/15 1-12 * * *"   # overnight NY: single poll every 15 min
  workflow_dispatch:
    inputs:
      test_dm:
        description: "Send a one-off test DM and exit"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: pr-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll notifications and DM Slack
        run: |
          if [ "$TEST_DM" = "1" ]; then
            python notify.py
            exit 0
          fi
          h=$((10#$(date -u +%H)))
          # Daytime scheduled runs loop ~every 2 min for the hour; everything else polls once.
          if [ "${{ github.event_name }}" = "schedule" ] && { [ "$h" -eq 0 ] || [ "$h" -ge 13 ]; }; then
            echo "daytime: polling ~every 2 min for the hour"
            for i in $(seq 1 25); do python notify.py || true; sleep 120; done
          else
            python notify.py
          fi
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GITHUB_LOGIN: hertjo
          TEST_DM: ${{ github.event.inputs.test_dm == 'true' && '1' || '' }}

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "pr-notifier"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update notifier state"
            git push
          fi
